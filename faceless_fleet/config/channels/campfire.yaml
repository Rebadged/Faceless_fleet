# Fleet channel — Campfire Comforts (focal_point: campfire)
# Engine: scene = campfire x weather/SEASON. The scene carries its FOCAL sound
# (fire); the SEASON adds an ambient palette (summer=crickets/frogs, fall=rain/
# wind/thunder, winter=wind). Same stylized look + playlists-by-season.

channel:
  slug: campfire
  name: "Campfire Comforts"
  focal_point: campfire
  lane: campfire_cozy
  youtube_handle: "@CampfireComforts"
  youtube_channel_id: "UCkQ1ntlMl7vtkBhi0XB5VNQ"   # verified by Relay 2026-07-12 (public lookup)
  oauth_secret_env: YT_CAMPFIRE_REFRESH_TOKEN
  bio: "Cozy campfire ambience for sleep, study, and relaxation. Crackling fires under summer stars with crickets and frogs, gentle rain on the flames in autumn, and quiet snowy nights deep in the forest. Get comfortable and let the fire carry you off. Every ambience is handcrafted — scenes painted in our signature storybook style, soundscapes mixed by hand for deep, uninterrupted rest. New ambiences every week."
  language: en
  audience_geo_hint: "US/UK/CA/AU"

identity:
  mood: "around a campfire at night, warm and safe under the trees and stars"
  palette: ["#0d1626", "#1b2a3a", "#3a2310", "#c8651b", "#e8a040"]
  film_look: "cinematic stylized painterly realism, idealized cozy, shot on film, warm firelight vs cool night, shallow depth of field, subtle grain, 16:9"
  negative: "no people, no text on any surface, no signage, no labels, no clutter, minimal objects, no foreground tree trunks, no dark vertical trunks framing the shot, no warped geometry, no melting objects, no watermarks, no logos, no fast or jarring motion"
  motion_principle: "camera essentially locked, at most a barely-perceptible slow drift; the real motion is the dancing fire + falling rain/snow, which loops seamlessly"

# Season -> ambient palette (layered UNDER each scene's focal fire sound).
season_audio:
  summer: [{el: crickets, gain: 0.4}, {el: frogs, gain: 0.3}]
  fall:   [{el: rain_light, gain: 0.6}, {el: wind, gain: 0.3}, {el: thunder, gain: 0.4}]
  winter: [{el: wind, gain: 0.5}]


# ══════════════════════════════════════════════════════════════════════════════
# LOOK RULES — LOCKED BY CK 2026-07-03 (validated on renders, see BRANDING.md §Look)
#  LIGHT = FIRE, ALWAYS: doors closed in weather; windows/tent fabric show only a
#    dim warm FLICKERING fire glow (visible fire shadows through glass, or a dancing
#    warm patch cast on the ground). No steady lamps, no glaring bright windows,
#    no see-through tent fabric (solid rainfly, diffuse glow only, nothing inside visible).
#  FIRES BURN CASUAL: low lazy flames over embers, never a raging bonfire.
#  WIND LIVES HERE: at least one foreground element visibly moves (foliage brushing,
#    grass rippling, ferns nodding, rain streaks); prompts must say it EXPLICITLY
#    (timid wording renders static).
#  MOODS: tent = you're camping; cabin = shelter in the wilderness; fire = a warm
#    bubble in the open dark.
# ══════════════════════════════════════════════════════════════════════════════
scene_pool:
  - id: fire_tallpines                  # APPROVED LOOK REF (CK 2026-07-03: "that fire one is great") still 9921edb9 / clip f49a70a7
    weather: fire
    keyword: "Campfire in the Forest"
    audio_hint: "low crackling fire + night forest ambience, exposed-in-the-open feel"
    audio_layers: [{el: fireplace, gain: 1.0}, {el: crickets, gain: 0.3}]
    still_prompt: "a small modest campfire burning low and calm in a clearing among very tall dark pine trees at dusk, lazy small flames over a bed of glowing orange embers, the fire small in the frame near the bottom, the towering trunks rising high above and fading into the darkening sky, the gentle firelight reaching only a few meters before the forest swallows it, low branches and undergrowth at the clearing edge stirring slightly in the wind, the feeling of being a small warm point in a vast dark forest, {film_look}"
    motion_prompt: "the small campfire burning low and lazy, modest flames wavering and licking slowly over the glowing embers, the ember bed pulsing softly, faint warm light flickering on the surrounding grass, thin smoke drifting up, the undergrowth stirring slightly in a light breeze, the tall pine trunks completely still, {motion_principle}, no people"
  - id: fire_close                      # APPROVED LOOK REF (CK 2026-07-03) still be9ccf59 / clip 0fac62c5
    weather: fire
    keyword: "Crackling Campfire"
    audio_hint: "close crackling fire, intimate"
    audio_layers: [{el: fireplace, gain: 1.0}]
    still_prompt: "a close campfire of crossed logs burning with lively flames and tiny sparks drifting upward, glowing embers underneath, set on rocky ground in a forest at deep dusk, the surrounding pines soft and out of focus in cool blue shadow behind the warm fire, thin smoke curling up, leaves at the edge of the firelight trembling in a light wind, intimate and mesmerizing, {film_look}"
    motion_prompt: "the campfire flames curling and dancing over the crossed logs, tiny orange sparks drifting and swirling upward, the embers underneath glowing and breathing, thin smoke curling up and dispersing, the out-of-focus leaves behind trembling slightly in a light wind, {motion_principle}, no people"
  - id: campfire_clearing             # summer night
    weather: clear
    keyword: "Crackling Campfire & Summer Night"
    audio_hint: "fire + crickets + frogs (summer palette)"
    audio_layers: [{el: fireplace, gain: 1.0}]
    still_prompt: "a warm campfire burning in an open forest clearing at night under a sky full of stars, glowing embers and dancing flames, tall dark pines set back around the clearing, open foreground, deep blue summer night, cozy, {film_look}"
    motion_prompt: "the campfire flames dancing and flickering continuously, embers and sparks drifting upward, faint twinkle of stars, the warm firelight pulsing on the surrounding trees, {motion_principle}, no people"
  - id: campfire_rain                 # autumn drizzle
    weather: rain
    keyword: "Campfire & Light Autumn Rain"
    audio_hint: "fire + light rain + wind + distant thunder (fall palette)"
    audio_layers: [{el: fireplace, gain: 1.0}]
    still_prompt: "a warm campfire burning in a forest clearing at night, a light drizzle in the air with a few drops sizzling on the flames, faint steam rising off the embers, tall dark pines set back, open foreground, deep blue night, cozy, {film_look}"
    motion_prompt: "the campfire flames dancing and flickering, only a light drizzle in the air, the occasional drop falling into the fire and sizzling with a wisp of steam, embers rising, warm light pulsing on the trees, {motion_principle}, no people"
  - id: campfire_snow                 # winter
    weather: snow
    keyword: "Campfire in the Snow"
    audio_hint: "fire + soft winter wind"
    audio_layers: [{el: fireplace, gain: 1.0}]
    still_prompt: "a warm campfire burning in a snowy forest clearing at night, snow falling softly around it, glowing embers, tall snow-laden pines set back, open snow foreground reflecting the firelight, deep blue night, cozy, {film_look}"
    motion_prompt: "the campfire flames dancing, snow falling steadily and softly around the fire, embers drifting up, warm firelight shimmering on the snow, {motion_principle}, no people"
  - id: campfire_lakeside             # summer by the water
    weather: clear
    keyword: "Campfire by the Lake"
    audio_hint: "fire + lake water + crickets + frogs (summer)"
    audio_layers: [{el: fireplace, gain: 1.0}, {el: water, gain: 0.45}]
    still_prompt: "a warm campfire on the shore of a calm lake at night, the fire's reflection shimmering on the still water, dark pine forest behind, stars above, open foreground, deep blue summer night, cozy, {film_look}"
    motion_prompt: "the campfire flames dancing, its glow shimmering on the calm rippling lake, embers rising, faint star twinkle, {motion_principle}, serene, no people"

location_pool:
  - {title: "Canadian Rockies", prompt: "in the snowy Canadian Rockies near Banff"}
  - {title: "Pacific Northwest", prompt: "in the Pacific Northwest pine forest"}
  - {title: "Scottish Highlands", prompt: "in the Scottish Highlands"}
  - {title: "Norwegian Forest", prompt: "in a remote Norwegian pine forest"}

weather_map:
  clear: {season: summer, playlist: "Summer Campfire Nights"}
  rain:  {season: fall,   playlist: "Rainy Campfire Nights"}
  snow:  {season: winter, playlist: "Snowy Campfire Nights"}
playlists:
  - "Summer Campfire Nights"
  - "Rainy Campfire Nights"
  - "Snowy Campfire Nights"
  - "8-Hour Campfire Ambience"

audio:
  bed_source: file
  bed_file: ""
  loudness_lufs: -14
  sfx_dir: assets/sfx
  sfx_library:
    fireplace: fireplace.wav
    rain_light: rain_light.wav
    wind: wind_winter.wav
    thunder: thunder_distant.wav
    crickets: crickets.wav
    frogs: frogs.wav
    water: lake_water.wav

longform:
  variants: ["1h", "3h", "8h"]
  seamless_loop: true

metadata:
  title_templates:
    - "{keyword} for Deep Sleep | {location} | {dur}"
    - "{keyword} Sounds for Sleeping | {location} | {dur}"
    - "{keyword} | {location} | {dur} (No Mid-Roll Ads)"
    - "{keyword} for Sleep & Relaxation | {location} | {dur} (Cinematic)"
  description: |
    Welcome to Campfire Comforts. 🔥✨ A crackling campfire under the trees — for deep sleep, studying, reading, or relaxing.

    Every Campfire Comforts ambience is handcrafted: the scene painted in our signature storybook style, the soundscape mixed by hand so nothing ever startles you awake.
    No interruptions while you drift off. New ambiences every week.

    ▶ Playlists: Summer Campfire Nights · Rainy Campfire Nights · Snowy Campfire Nights
    🌲 Sister channels: Cabin Comforts · Tent Comforts

    #campfire #firesounds #sleepsounds #ambience #studymusic #cozy #nature
  tags: ["campfire sounds", "fire sounds", "crackling fire", "sleep sounds", "campfire ambience", "nature sounds", "fire for sleeping", "crickets", "frogs"]
  made_for_kids: false
  ai_disclosure: false

ads:
  pre_roll: true
  mid_rolls: false
  post_roll: false

cadence:
  uploads_per_week: 3
  shorts_per_week: 5
