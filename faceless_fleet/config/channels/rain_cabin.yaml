# Channel 1 (LEAD) — Cabin Comforts (rain / storm / snow cozy-cabin ambience)
# Research pick #1: biggest evergreen search demand x CK's motion moat x broad
# job-to-be-done (sleep + focus + relaxation). No character, no narration.
#
# LOOK LOCKED (operator-approved 2026-06-25): cinematic STYLIZED painterly cozy;
# cabin in an open snowy/wet clearing, DENSE forest as a backdrop behind it (no
# foreground trunks), warm firelight FLICKERING in the windows + reflecting on the
# snow/ground; locked camera, the falling snow/rain + firelight flicker are the loop.
# Reference approved still: 047a7022 (snowy_cabin_exterior, Canadian/BC).

channel:
  slug: rain_cabin
  name: "Cabin Comforts"               # covers rain, storm AND snow (seasonal range)
  focal_point: cabin                   # the fleet unit: one focal point = one channel
  lane: rain_storm_cozy
  youtube_handle: "@CabinComforts"     # confirm availability when creating; else @CabinComfortsTV etc
  youtube_channel_id: ""   # DO NOT set: previous channel UCbayo4s0nrP0-n2iagNDBQw TERMINATED by YouTube 2026-07-12 (ToS); awaiting CK appeal/recreate decision
  oauth_secret_env: YT_RAINCABIN_REFRESH_TOKEN   # separate Brand Account / email (hygiene)
  language: en
  audience_geo_hint: "US/UK/CA/AU"    # English metadata -> high-CPM markets
  # Channel "About" / bio:
  bio: "Cozy cabin ambience for sleep, study, and relaxation. Rain, thunderstorms, crackling fireplaces, and gentle snowfall from cabins tucked deep in the world's most beautiful forests. Dim the lights, get comfortable, and let the quiet take over. Every ambience is handcrafted — scenes painted in our signature storybook style, soundscapes mixed by hand for deep, uninterrupted rest. New ambiences every week."

identity:
  mood: "cozy, safe, sheltered-from-the-storm; warm cabin while it pours/snows outside"
  palette: ["#0d1b2a", "#1b2a3a", "#3a2a1a", "#c8772b", "#e0a050"]   # storm-blue + firelight amber
  # Chosen look: cinematic STYLIZED painterly realism (grounded but idealized — hides
  # AI artifacts, more ownable/recognizable brand, cozier). Not photoreal, not cartoon.
  film_look: "cinematic stylized painterly realism, idealized cozy, shot on film, warm window glow vs cool night, shallow depth of field, subtle grain, 16:9"
  # KEEP SCENES SPARSE: few objects (object-heavy interiors produce gibberish text +
  # fake-looking props). Favor exteriors + simple textures.
  negative: "no people, no text on any surface, no signage, no books, no labels, no readable screens, no clutter, minimal objects, no foreground trees, no tree trunks in front of the cabin, no dark vertical trunks framing the shot, no silhouetted foreground branches, no bare tree bark in the foreground, no trees crowding or blocking the cabin, no warped geometry, no melting objects, no watermarks, no logos, no fast or jarring motion"
  # MOTION PRINCIPLE (operator feedback): camera mostly LOCKED OFF — no push-in/out,
  # at most the faintest pivot. The loop comes from the AMBIENT ELEMENT (falling snow,
  # falling rain, dancing fire), not camera movement. Element motion loops seamlessly.
  motion_principle: "camera essentially locked, at most a barely-perceptible slow drift; the real motion is the falling snow / rain / dancing fire, which loops seamlessly"

# Scene pool — sparse, mostly EXTERIOR, locked camera, element-driven motion.
# Each scene carries: weather (drives the matching Suno bed via audio_hint),
# keyword (the title's leading search phrase, so titles match the weather).

# ══════════════════════════════════════════════════════════════════════════════
# LOOK RULES — LOCKED BY CK 2026-07-03 (validated on renders, see BRANDING.md §Look)
#  LIGHT = FIRE, ALWAYS: doors closed in weather; windows/tent fabric show only a
#    dim warm FLICKERING fire glow (visible fire shadows through glass, or a dancing
#    warm patch cast on the ground). No steady lamps, no glaring bright windows,
#    no see-through tent fabric (solid rainfly, diffuse glow only, nothing inside visible).
#  FIRES BURN CASUAL: low lazy flames over embers, never a raging bonfire.
#  WIND LIVES HERE: at least one foreground element visibly moves (foliage brushing,
#    grass rippling, ferns nodding, rain streaks); prompts must say it EXPLICITLY
#    (timid wording renders static).
#  MOODS: tent = you're camping; cabin = shelter in the wilderness; fire = a warm
#    bubble in the open dark.
# ══════════════════════════════════════════════════════════════════════════════
scene_pool:
  - id: snowy_cabin_exterior            # the hero shot (operator's idea)
    weather: snow
    keyword: "Gentle Snowfall & Crackling Fireplace"
    audio_hint: "soft winter wind + crackling fireplace, NO rain"
    audio_layers: [{el: wind, gain: 0.55}, {el: fireplace, gain: 0.8}]
    # PNW reference: log/A-frame cabin nestled in a DENSE snow-laden pine forest,
    # actively snowing; windows read as flickering FIRELIGHT (not a steady bulb,
    # the fire itself not the focus / not really visible).
    still_prompt: "exterior of a cozy log cabin sitting in an open snowy clearing at night, a DENSE thick forest of snow-covered evergreen pine trees forming a full continuous backdrop behind and around the cabin, clean open fresh snow in the foreground with warm window light spilling and reflecting across it, the ground between the camera and the cabin completely open and empty, fresh snow actively falling, one window showing a dim warm fire glow flickering from inside, door closed, deep blue snowy night, {film_look}"
    motion_prompt: "thick snow falling steadily and continuously across the whole frame, the warm window light gently flickering and pulsing, casting dancing shifting warm glow and soft moving shadows across the snow and the cabin walls, distant forest still, {motion_principle}, no people"
  - id: cabin_night_forest              # APPROVED LOOK REF (CK 2026-07-03) still 8d197142 / clip b01cbf26
    weather: rain
    keyword: "Rain & Distant Thunder"
    audio_hint: "heavy forest rain + distant thunder + faint fire crackle, NO wind bed"
    audio_layers: [{el: rain_heavy, gain: 1.0}, {el: thunder, gain: 0.5}, {el: fireplace, gain: 0.25}]
    still_prompt: "a small dark log cabin deep in a rainy night forest, door closed, the cabin nearly unlit, one window showing only a faint dim warm glow from a fire burning low somewhere inside, uneven restless firelight barely flickering through the glass, a weak warm patch of dancing light on the wet ground under the window, most of the scene in deep blue-black darkness, heavy rain falling, ferns and low branches around the clearing swaying gently in the wind, dense dark evergreens behind, quiet shelter in the wilderness, {film_look}"
    motion_prompt: "heavy rain falling in clearly visible streaks and dripping from the roof edge, the warm light in the windows flickering unevenly and pulsing like a real fire burning low inside, brightening and dimming irregularly, the weak warm patch of light on the wet ground dancing and shifting with the flicker, the ferns and low branches swaying gently in the wind, {motion_principle}, no people"
  - id: cabin_meadow_dusk               # APPROVED LOOK REF (CK 2026-07-03) still 6c363ec5 / clip 9ccd1c23
    weather: rain
    keyword: "Mountain Rain"
    audio_hint: "light rain + breeze through grass + faint fire crackle"
    audio_layers: [{el: rain_light, gain: 1.0}, {el: fireplace, gain: 0.3}]
    still_prompt: "a small weathered log cabin with a steep pitched roof alone on an alpine meadow at blue-hour dusk, rugged mountain ridge rising behind it, light rain falling, tall grass and wildflowers leaning in the wind around the cabin, the door closed, one window glowing with soft warm light that flickers like a fire burning somewhere inside, the faint warm glow spilling weakly onto the wet grass below the window, everything else cool blue dusk, {film_look}"
    motion_prompt: "light rain falling in visible streaks, the tall grass and wildflowers around the cabin rippling and leaning in waves as wind brushes through the meadow, the single window light flickering softly like a fire inside, thin mist drifting slowly along the mountain ridge behind, {motion_principle}, no people"
  - id: rainy_cabin_autumn              # FALL LAUNCH HERO (CK 2026-07-01: start with Fall)
    weather: rain
    keyword: "Autumn Rain & Distant Thunder"
    audio_hint: "heavy rain + distant thunder + faint fireplace, NO wind"
    audio_layers: [{el: rain_heavy, gain: 1.0}, {el: thunder, gain: 0.5}, {el: fireplace, gain: 0.25}]
    # Validated 2026-07-01 (Fable): positive-only wording, no literal-fire phrasing.
    still_prompt: "a cozy log cabin sitting alone in a wide open clearing on a rainy autumn night, the ground between the camera and the cabin completely open and empty, wet fallen leaves scattered across the grass reflecting warm light, a dense thick wall of tall evergreens mixed with golden and deep-red autumn maples rising behind the cabin as a full continuous backdrop, steady rain falling through the scene, one window showing a dim warm fire glow flickering from inside, door closed, the warm glow spilling out across the wet ground in long shimmering reflections, a gentle wisp of smoke from the stone chimney, low mist hanging between the distant trees, deep blue-grey rainy night, serene and sheltered, {film_look}"
    # Motion must be EXPLICIT and multi-element or Kling under-animates (validated:
    # "gentle/subtle only-motion-is-X" wording produced a near-static clip).
    motion_prompt: "heavy rain falling in clearly visible streaks across the entire frame, raindrops striking the wet ground and making the warm reflections ripple and shimmer continuously, the amber window light flickering warmly and casting moving glow on the wet leaves, chimney smoke drifting slowly upward and dispersing, autumn leaves on the trees trembling lightly under the rain, {motion_principle}, no people"
  - id: autumn_porch_storm              # validated 2026-07-02 (sample V1)
    weather: storm
    keyword: "Rain on Porch & Thunder"
    audio_hint: "rain on porch roof + rolling thunder, NO wind"
    audio_layers: [{el: rain_heavy, gain: 1.0}, {el: thunder, gain: 0.7}]
    still_prompt: "covered wooden cabin porch during a heavy night thunderstorm in autumn, rain pouring off the roof eaves in even sheets, a single hanging lantern glowing warm amber, wet golden fallen leaves scattered on the porch boards, misty dark pine forest beyond the railing, deep blue-grey stormy night, {film_look}"
    motion_prompt: "heavy rain pouring off the roof eaves in visible sheets beyond the railing, rain streaking through the air across the misty forest, the hanging lantern glowing warmly and swaying very gently, rainwater trickling and dripping from the eaves, wet golden leaves glistening as the light shifts, {motion_principle}, no people"
  - id: lakeside_autumn                 # validated 2026-07-02 (sample V4)
    weather: rain
    keyword: "Lakeside Rain"
    audio_hint: "gentle rain + faint fireplace, NO wind"
    audio_layers: [{el: rain_light, gain: 1.0}, {el: fireplace, gain: 0.3}]
    # NOTE: serene water scenes NEED "heavy rain"-energy motion wording or Kling
    # renders them static (two failed gentle-worded attempts before this one).
    still_prompt: "a lone cozy log cabin on the shore of a calm dark lake on a rainy autumn night, the water between the camera and the cabin smooth and open, a dense autumn forest of tall evergreens mixed with golden and deep-red maples rising behind the cabin, gentle rain falling softly, one window showing a dim warm fire glow flickering from inside, door closed, the warm glow stretching in long shimmering reflections across the lake surface, low mist drifting over the far shore, deep blue-grey night, serene and sheltered, {film_look}"
    motion_prompt: "heavy rain pouring down in thick clearly visible streaks over the entire scene, the lake surface alive with overlapping raindrop rings and splashes everywhere, the warm window reflections breaking apart and reforming on the water, mist drifting along the far shore, {motion_principle}, no people"
  - id: highlands_rain                  # validated 2026-07-02 (sample V5)
    weather: rain
    keyword: "Heavy Rain"
    audio_hint: "pure heavy rain, nothing else"
    audio_layers: [{el: rain_heavy, gain: 1.0}]
    still_prompt: "a sturdy old stone cottage standing alone on open moorland in the Scottish Highlands during a night rainstorm, heavy rain sweeping across the dark heather hills in visible sheets, the cottage windows glowing warm amber from deep inside, warm light spilling onto the wet stone path, mist rolling low over the slopes, dark crags rising far behind, the ground between the camera and the cottage open and empty, deep blue-grey stormy night, {film_look}"
    motion_prompt: "heavy rain sweeping across the moorland in visible wind-blown sheets, rain streaking through the air across the whole frame, mist rolling slowly over the dark hills, the warm window light flickering gently, rainwater glistening and running on the wet stone path, {motion_principle}, no people"
  - id: cabin_window_glow_rain          # exterior rain variant
    weather: rain
    keyword: "Heavy Rain & Distant Thunder"
    audio_hint: "heavy rain + distant thunder + faint fireplace"
    audio_layers: [{el: rain_heavy, gain: 1.0}, {el: thunder, gain: 0.5}, {el: fireplace, gain: 0.25}]
    still_prompt: "exterior of a cozy log cabin in a clearing at night, a dense thick forest of tall pine trees forming a full continuous backdrop behind and around the cabin, heavy rain actively falling, one window showing a dim warm fire glow flickering from inside, door closed, the warm light spilling and reflecting on the wet ground in the open foreground, the ground between the camera and the cabin completely open and empty, dark wet evergreens, deep blue rainy night, {film_look}"
    motion_prompt: "heavy rain falling steadily and continuously across the frame, the warm window light gently flickering and pulsing, casting dancing warm glow and reflections on the wet ground, water dripping from the roof edge, occasional faint distant lightning glow, distant forest still, {motion_principle}, no people"
  - id: frozen_lake_cabin               # sparse snowy vista
    weather: snow
    keyword: "Snowfall & Fireplace"
    audio_hint: "gentle wind + crackling fire, NO rain"
    audio_layers: [{el: wind, gain: 0.5}, {el: fireplace, gain: 0.75}]
    still_prompt: "a lone cozy log cabin on the shore of a frozen lake at night, a dense thick forest of snow-covered pines forming a full backdrop behind the cabin, snow actively falling, one window showing a dim warm fire glow flickering from inside, door closed, the warm light reflecting across the open snowy foreground and the frozen lake, the ground between the camera and the cabin completely open and empty, deep blue snowy night, {film_look}"
    motion_prompt: "snow falling steadily and continuously, the warm window light gently flickering and pulsing, its glow shimmering on the snow and the frozen lake, distant forest still, {motion_principle}, serene, no people"
  - id: porch_storm                     # KEEPER (operator liked it)
    weather: storm
    keyword: "Rain & Thunderstorm"
    audio_hint: "rain on porch roof + rolling thunder"
    audio_layers: [{el: rain_heavy, gain: 1.0}, {el: thunder, gain: 0.7}]
    still_prompt: "covered wooden cabin porch during a heavy thunderstorm at night, rain pouring off the roof eaves in even sheets, a single hanging lantern glowing warm, misty dark pine forest beyond, {film_look}"
    motion_prompt: "rain pouring steadily off the eaves in even sheets, lantern swaying very slightly, puddles rippling from raindrops, occasional distant lightning, {motion_principle}, no people"
  - id: fireplace_closeup               # KEEPER (operator liked it)
    weather: fire
    keyword: "Crackling Fireplace"
    audio_hint: "crackling fire + faint rain outside"
    audio_layers: [{el: fireplace, gain: 1.0}, {el: rain_light, gain: 0.2}]
    still_prompt: "close-up of a stone fireplace with crackling burning logs in a dark cozy cabin at night, glowing embers, warm amber firelight on the stone, simple and uncluttered, {film_look}"
    motion_prompt: "logs burning, flames dancing slowly and continuously, embers drifting upward, warm light pulsing on the stone, {motion_principle}, hypnotic, no people"

# Named-location rotation. Per the geography research: location is per-video
# VARIATION + SEO seasoning, NOT an RPM lever (RPM = viewer country, set by the
# LANGUAGE of metadata). So: short evocative place names paired with the generic
# keyword in titles; the descriptive `prompt` form drives the image only.
# `title` = short (goes in the video title); `prompt` = descriptive (goes to Higgsfield).
location_pool:
  # Canadian / North American cozy
  - {title: "Canadian Rockies Cabin",   prompt: "a snowbound log cabin in the Canadian Rockies near Banff"}
  - {title: "British Columbia Cabin",    prompt: "a remote cabin in the snowy mountains of British Columbia, Canada"}
  - {title: "Pacific Northwest Cabin",   prompt: "a log cabin in the rainy pine forests of the Pacific Northwest"}
  # British Isles (high English affinity, NH winter)
  - {title: "Scottish Highlands Cabin",  prompt: "a stone cottage in the Scottish Highlands during a storm"}
  - {title: "Lake District Cottage",     prompt: "a cozy cottage in the English Lake District in the rain"}
  # Alpine / European aesthetic (English titles — for the LOOK, not to capture EU viewers)
  - {title: "Swiss Alps Cabin",          prompt: "a wooden chalet in the Swiss Alps during a snowfall"}
  - {title: "Norwegian Fjord Cabin",     prompt: "a wooden cabin by a fjord in northern Norway"}

# Weather drives season + which binge-playlist a video lands in (autoplay loops
# them = stacked overnight watch-hours). The loop tags each video automatically.
weather_map:
  snow:  {season: winter, playlist: "Snowy Cabin Nights"}
  rain:  {season: any,    playlist: "Rainy Cabin Nights"}
  storm: {season: any,    playlist: "Cabin Thunderstorms"}
  fire:  {season: any,    playlist: "Cabin & Fireplace"}
playlists:
  - "Snowy Cabin Nights"
  - "Rainy Cabin Nights"
  - "Cabin Thunderstorms"
  - "Cabin & Fireplace"
  - "8-Hour Cabin Ambience"

audio:
  # SOUNDSCAPE, not music or voice. Best source = layered royalty-free / CC0 real
  # recordings (rain + distant thunder + fireplace crackle), looped with ffmpeg.
  # Real foley beats AI for rain/fire authenticity and is free/ToS-safe.
  #   - NOT Suno (that's music -> the sleep_ambient channel) and NOT ElevenLabs
  #     (that's voice/TTS -> the future meditation/narration channel).
  #   - audio_hint on each scene says which mix to build (rain vs snow-wind vs fire).
  bed_source: file                    # 'file' bed.wav fallback, or SFX layers below
  bed_file: ""
  loudness_lufs: -16                  # CK decision 2026-06: sleep band (research: -16..-20);
                                      # consistent loudness; no spikes that wake sleepers
  # Grab these 5 element files ONCE (Pixabay, see LAUNCH_PLAN.md) into sfx_dir.
  # Each scene's `audio_layers` mixes them at sleep-safe levels into that video's bed.
  sfx_dir: assets/sfx
  sfx_library:
    rain_heavy: rain_heavy.wav
    rain_light: rain_light.wav
    thunder: thunder_distant.wav
    fireplace: fireplace.wav
    wind: wind_winter.wav
    crickets: crickets.wav

longform:
  # Length ladder — round hours ARE the search convention here ("8 hours rain").
  variants: ["1h", "3h", "8h", "12h"]  # CK: 1h/8h/12h ladder
  seamless_loop: true                 # crossfade the short clip end->start (invisible seam)

metadata:
  # Research title convention: [Sound + Benefit] | [short Location] | [Duration] [+ modifier].
  # Generic high-volume keyword LEADS (first ~60 chars); the place name is seasoning.
  # Modifiers reflect OUR edge (cinematic motion, crackling fire) — never "Black Screen"
  # (we're the opposite) and never "No Ads" (we run pre-roll); "No Mid-Roll Ads" is honest.
  # {keyword} comes from the chosen scene so the title matches the weather
  # (snow scene -> "Gentle Snowfall…", rain scene -> "Heavy Rain…").
  title_templates:
    - "{keyword} for Deep Sleep | Cozy {location} | {dur}"
    - "{keyword} Sounds for Sleeping | {location} | {dur}"
    - "{keyword} | Cozy {location} | {dur} (No Mid-Roll Ads)"
    - "{keyword} for Sleep & Relaxation | {location} | {dur} (Cinematic)"
  description: |
    Welcome to Cabin Comforts. 🌲🔥 Heavy rain, distant thunder, gentle snowfall, and a crackling fireplace at a cozy cabin in the woods — for deep sleep, studying, reading, or relaxing.

    Every Cabin Comforts ambience is handcrafted: the scene painted in our signature storybook style, the soundscape mixed by hand so nothing ever startles you awake.

    No interruptions while you drift off. New ambiences every week.

    ▶ Playlists: Rain for Deep Sleep · 8-Hour Storms · Snowy Cabin Nights

    #rain #rainsounds #fireplace #sleepsounds #thunderstorm #ambience #studymusic #cozy
  tags: ["rain sounds", "rain and thunder", "fireplace sounds", "cozy cabin", "rain for sleeping", "thunderstorm sounds", "sleep sounds", "rain on window", "ambience", "study sounds"]
  made_for_kids: false
  ai_disclosure: false                # non-realistic ambient visuals; disclose if a scene ever reads as a real place/event

ads:
  # Deep-sleep/overnight length -> minimize interruptions (research ad table).
  pre_roll: true
  mid_rolls: false                    # 1h/3h/8h sleep lengths: off
  post_roll: false                    # post-roll at end of a sleep journey = #1 complaint
  note: "If a 20-60min focus cut is made, enable sparse mid-rolls (~every 12-15min) on THAT cut only."

cadence:
  uploads_per_week: 3                 # 2-3 distinct long-form + 4-5 Shorts/week (funnel)
  shorts_per_week: 5

# Discovery funnel (CK's 50+ hook library across curiosity/POV/bold/FOMO/comment-bait).
funnel:
  shorts_source: "10-30s vertical cut of the motion clip + hook overlay"
  playlists: ["Rain for Deep Sleep", "8-Hour Storms", "Cozy Cabin Nights"]
