  bed_file: ""
  loudness_lufs: -14
  sfx_dir: assets/sfx
  sfx_library:
    rain_tent: rain_on_tent.wav
    rain_light: rain_light.wav
    fireplace: fireplace.wav
    wind: wind_winter.wav
    thunder: thunder_distant.wav
    crickets: crickets.wav
    frogs: frogs.wav
    water: lake_water.wav

longform:
  variants: ["1h", "3h", "8h"]
  seamless_loop: true

metadata:
  title_templates:
    - "{keyword} for Deep Sleep | {location} | {dur}"
    - "{keyword} Sounds for Sleeping | {location} | {dur}"
    - "{keyword} | {location} | {dur} (No Mid-Roll Ads)"
    - "{keyword} for Sleep & Relaxation | {location} | {dur} (Cinematic)"
  description: |
    Welcome to Tent Comforts. ⛺🌧️ Rain on the tent, a warm lantern glow, the quiet of the forest — for deep sleep, studying, or relaxing.

    Every Tent Comforts ambience is handcrafted: the scene painted in our signature storybook style, the soundscape mixed by hand so nothing ever startles you awake.
    No interruptions while you drift off. New ambiences every week.

    ▶ Playlists: Rain on the Tent · Summer Camping Nights · Snowy Camping Nights
    🌲 Sister channels: Cabin Comforts · Campfire Comforts

    #rainontent #camping #rainsounds #sleepsounds #ambience #cozy #nature
  tags: ["rain on tent", "camping sounds", "rain sounds", "sleep sounds", "tent rain", "camping ambience", "rain for sleeping", "crickets", "frogs"]
  made_for_kids: false
  ai_disclosure: false

ads:
  pre_roll: true
  mid_rolls: false
  post_roll: false

cadence:
