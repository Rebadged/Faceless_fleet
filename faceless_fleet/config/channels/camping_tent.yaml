# Fleet channel — Tent Comforts (focal_point: tent)
# The vibe: tucked inside a warm tent while it rains/snows outside.
# Engine: scene = tent x weather/SEASON; focal sound (rain-on-tent, fire, water)
# + the season's ambient palette. Tent rain audio = "rain on tent/tarp" (the drum).

channel:
  slug: camping_tent
  name: "Tent Comforts"                # "[Focal] Comforts" family for cross-linking
  focal_point: tent
  lane: tent_cozy
  youtube_handle: "@TentComforts"
  youtube_channel_id: "UCB38YQ4XU04FJUrzjIQ7GQg"   # verified by Relay 2026-07-12 (public lookup)
  oauth_secret_env: YT_TENT_REFRESH_TOKEN
  bio: "Cozy camping ambience for sleep and relaxation. Rain drumming on the tent, summer nights full of crickets and frogs by the lake, a campfire just outside, and quiet snowy nights in the wild. Crawl in, get warm, and let it carry you off. Every ambience is handcrafted — scenes painted in our signature storybook style, soundscapes mixed by hand for deep, uninterrupted rest. New ambiences every week."
  language: en
  audience_geo_hint: "US/UK/CA/AU"

identity:
  mood: "warm and dry inside a glowing tent while the forest breathes outside"
  palette: ["#0a1422", "#16263a", "#2a3a2a", "#c89030", "#e8c060"]
  film_look: "cinematic stylized painterly realism, idealized cozy, shot on film, warm lantern glow vs cool night, shallow depth of field, subtle grain, 16:9"
  negative: "no people, no text on any surface, no signage, no labels, no clutter, minimal objects, no foreground tree trunks, no dark vertical trunks framing the shot, no warped geometry, no melting objects, no watermarks, no logos, no fast or jarring motion"
  motion_principle: "camera essentially locked, at most a barely-perceptible slow drift; the real motion is the falling rain/snow + flickering lantern, which loops seamlessly"

season_audio:
  summer: [{el: crickets, gain: 0.4}, {el: frogs, gain: 0.3}]
  fall:   [{el: rain_light, gain: 0.4}, {el: wind, gain: 0.3}, {el: thunder, gain: 0.4}]
  winter: [{el: wind, gain: 0.5}]


# ══════════════════════════════════════════════════════════════════════════════
# LOOK RULES — LOCKED BY CK 2026-07-03 (validated on renders, see BRANDING.md §Look)
#  LIGHT = FIRE, ALWAYS: doors closed in weather; windows/tent fabric show only a
#    dim warm FLICKERING fire glow (visible fire shadows through glass, or a dancing
#    warm patch cast on the ground). No steady lamps, no glaring bright windows,
#    no see-through tent fabric (solid rainfly, diffuse glow only, nothing inside visible).
#  FIRES BURN CASUAL: low lazy flames over embers, never a raging bonfire.
#  WIND LIVES HERE: at least one foreground element visibly moves (foliage brushing,
#    grass rippling, ferns nodding, rain streaks); prompts must say it EXPLICITLY
#    (timid wording renders static).
#  MOODS: tent = you're camping; cabin = shelter in the wilderness; fire = a warm
#    bubble in the open dark.
# ══════════════════════════════════════════════════════════════════════════════
scene_pool:
  - id: tent_rain_forest                # APPROVED LOOK REF (CK 2026-07-03) still b2d64f0f / clip 54d685bd
    weather: rain
    keyword: "Rain on Tent"
    audio_hint: "rain drumming on the tent tarp + forest rain, camper POV"
    audio_layers: [{el: rain_on_tent, gain: 1.0}, {el: rain_light, gain: 0.4}]
    still_prompt: "a small tent pitched in a dark rainforest clearing during heavy night rain, the tent fully zipped closed against the weather, a soft warm light glowing gently through the wet solid fabric from a lantern inside, flickering faintly, nothing inside visible, rain streaking down through the frame and dripping off broad leaves, ferns and undergrowth swaying in the wind around the campsite, towering dark trees dissolving into mist above, deep blue-green night, the cozy feeling of being warm and dry while the storm carries on outside, {film_look}"
    motion_prompt: "heavy rain falling in clearly visible streaks, the large ferns in the foreground swaying and nodding as raindrops strike them, water dripping steadily off the leaves, the soft lantern glow inside the tent flickering gently through the fabric, mist drifting slowly between the dark trees behind, {motion_principle}, no people"
  - id: tent_stars_ridge                # APPROVED LOOK REF (CK 2026-07-03) still 887dd4dd / clip 3b79e06c — OPAQUE fabric took 3 rolls
    weather: clear
    keyword: "Night Camping Under the Stars"
    audio_hint: "night crickets + gentle breeze + distant owl, vast quiet"
    audio_layers: [{el: crickets, gain: 0.7}, {el: wind, gain: 0.25}]
    still_prompt: "a small dome tent with its solid opaque rainfly fully closed, pitched on an open mountain ridge under a vast starry night sky with the milky way arching overhead, the thick canvas walls glowing a soft even warm amber from a light source hidden deep inside, the fabric completely solid so only a gentle diffuse warmth shows through, no interior detail, dark mountain silhouettes on the horizon with the last deep orange trace of sunset, wind-bent alpine shrubs and grass tufts around the campsite, the tent small against an enormous sky, {film_look}"
    motion_prompt: "the warm glow inside the tent breathing and flickering gently through the solid fabric, the alpine shrubs and grass tufts around the campsite swaying in a light mountain breeze, stars twinkling faintly across the vast sky, the milky way steady, {motion_principle}, no people"
  - id: tent_rain                     # autumn rain on the canvas
    weather: rain
    keyword: "Heavy Rain on a Tent"
    audio_hint: "rain on tent/tarp (focal) + light rain + wind + distant thunder"
    audio_layers: [{el: rain_tent, gain: 1.0}]
    still_prompt: "a cozy camping tent glowing warmly from a lantern inside, pitched in an open forest clearing at night, heavy rain falling, tall dark pines set back as a backdrop, wet ground reflecting the warm tent glow, deep blue rainy night, {film_look}"
    motion_prompt: "heavy rain falling steadily and continuously, the warm tent glow flickering gently like a lantern inside, rain running down the tent canvas, {motion_principle}, no people"
  - id: tent_campfire                 # summer night
    weather: clear
    keyword: "Tent & Campfire Summer Night"
    audio_hint: "campfire (focal) + crickets + frogs (summer)"
    audio_layers: [{el: fireplace, gain: 0.9}]
    still_prompt: "a glowing camping tent beside a small warm campfire in an open forest clearing at night under the stars, dark pines set back, open foreground, deep blue summer night, cozy, {film_look}"
    motion_prompt: "the campfire flames dancing beside the tent, the tent glowing warmly and flickering, embers drifting up, faint star twinkle, {motion_principle}, no people"
  - id: tent_lakeside_stars          # summer by the lake
    weather: clear
    keyword: "Tent by the Lake Under the Stars"
    audio_hint: "lake water (focal) + crickets + frogs (summer)"
    audio_layers: [{el: water, gain: 0.55}]
    still_prompt: "a warmly glowing camping tent on the shore of a calm lake at night under a sky full of stars, the tent glow reflecting on the still water, dark pine forest behind, deep blue summer night, {film_look}"
    motion_prompt: "the warm tent glow flickering gently, its reflection shimmering on the calm rippling lake, faint star twinkle, {motion_principle}, serene, no people"
  - id: tent_snow                     # winter
    weather: snow
    keyword: "Snowy Tent & Winter Wind"
    audio_hint: "faint lantern warmth + soft winter wind"
    audio_layers: [{el: fireplace, gain: 0.3}]
    still_prompt: "a warmly glowing camping tent pitched in a snowy forest clearing at night, snow falling softly, tall snow-laden pines set back, open snow foreground reflecting the warm glow, deep blue night, {film_look}"
    motion_prompt: "snow falling steadily and softly around the tent, the warm tent glow flickering gently, {motion_principle}, serene, no people"

location_pool:
  - {title: "Pacific Northwest", prompt: "in the Pacific Northwest pine forest"}
